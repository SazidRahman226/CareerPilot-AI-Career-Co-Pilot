# ===== CareerPilot — Docker Compose =====
# Run the entire stack with: docker compose up --build

services:
  # --- Database: PostgreSQL ---
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: careerpilot
      POSTGRES_PASSWORD: careerpilot_secret
      POSTGRES_DB: careerpilot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Backend: Python FastAPI ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data          # Persist ChromaDB + uploads
      - model_cache:/root/.cache        # Cache sentence-transformers / HF models
      - chroma_onnx:/root/.cache/chroma # Cache the chromadb ONNX embedding model
      - ./backend/app:/app/app          # Hot reload in development
    env_file:
      - ./backend/.env
    environment:
      - HF_HOME=/app/data/huggingface
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s     # Model is pre-baked, fast startup
    restart: unless-stopped

  # --- Frontend: Next.js ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src         # Hot reload in development
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  backend_data:
    driver: local
  model_cache:
    driver: local
  chroma_onnx:
    driver: local
